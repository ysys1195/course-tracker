services:
  db:
    image: postgres:16-alpine
    container_name: course-tracker-db
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-course_tracker}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-course_tracker}"
      POSTGRES_DB: "${POSTGRES_DB:-course_tracker}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-course_tracker} -d ${POSTGRES_DB:-course_tracker}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
