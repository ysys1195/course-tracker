name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      AUTH_SECRET: dummy-auth-secret-for-ci
      AUTH_GITHUB_ID: dummy-github-id
      AUTH_GITHUB_SECRET: dummy-github-secret
      DATABASE_URL: postgresql://course_tracker:course_tracker@localhost:5432/course_tracker
      DIRECT_URL: postgresql://course_tracker:course_tracker@localhost:5432/course_tracker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm lint

      - name: Run build
        run: pnpm build
